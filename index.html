<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz - Astérix et Cléopâtre</title>

  <!-- Police style Astérix -->
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

  <style>
    :root {
      --asterix-gold: #ffd700;
      --asterix-red: #db281c;
      --asterix-green: #008435;
      --asterix-parchment: #f8e0b1;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #fff6d6, var(--asterix-parchment));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quiz-container {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      font-family: 'Luckiest Guy', cursive;
      color: var(--asterix-red);
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    #question {
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    #answers {
      display: grid;
      gap: 10px;
    }

    .answer-btn {
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: var(--asterix-gold);
    }

    .correct { background: var(--asterix-green); color: white; }
    .wrong { background: var(--asterix-red); color: white; }
    .neutral { background: #eee; }

    #feedback {
      margin-top: 15px;
      font-weight: bold;
    }

    #next-btn, #restart-btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
    }

    #next-btn { background: var(--asterix-green); display: none; }
    #restart-btn { background: #2d6cdf; display: none; }

    #score {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="quiz-container">
  <h1>Astérix & Cléopâtre</h1>

  <div id="progress"></div> <!-- IMPORTANT -->
  <h2 id="question"></h2>
  <div id="answers"></div>
  <div id="feedback"></div> <!-- IMPORTANT -->

  <button id="next-btn" onclick="nextQuestion()">Suivant</button>
  <button id="restart-btn" onclick="restartQuiz()">Recommencer</button>

  <h3 id="score"></h3>
  <div id="final-message"></div> <!-- IMPORTANT -->
</div>

<script src="script.js"></script>

</body>
</html>
