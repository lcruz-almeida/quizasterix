<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz - Astérix et Cléopâtre</title>
  <style>
    :root {
      --asterix-gold: #ffd700;
      --asterix-red: #db281c;
      --asterix-green: #008435;
      --asterix-black: #1a171e;
      --asterix-parchment: #f8e0b1;
      --asterix-white: #fffdf7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #fff6d6 0%, var(--asterix-parchment) 45%, #eed39c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--asterix-black);
    }

    .quiz-container {
      width: 100%;
      max-width: 720px;
      background: var(--asterix-white);
      border: 4px solid var(--asterix-black);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .quiz-container::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255, 215, 0, 0.08), transparent 30%),
        linear-gradient(315deg, rgba(219, 40, 28, 0.06), transparent 35%);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2rem;
      color: var(--asterix-red);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #4a3d22;
      font-size: 1rem;
    }

    #progress {
      margin-bottom: 16px;
      font-weight: bold;
      color: var(--asterix-black);
    }

    #question {
      font-size: 1.5rem;
      margin-bottom: 24px;
      line-height: 1.4;
      min-height: 72px;
    }

    #answers {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }

    .answer-btn {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: bold;
      border: 3px solid var(--asterix-black);
      border-radius: 12px;
      cursor: pointer;
      background: var(--asterix-gold);
      color: var(--asterix-black);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.25);
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 7px 0 rgba(0, 0, 0, 0.25);
    }

    .answer-btn:disabled {
      cursor: default;
      opacity: 1;
    }

    .answer-btn.correct {
      background: var(--asterix-green);
      color: white;
      border-color: #065c28;
    }

    .answer-btn.wrong {
      background: var(--asterix-red);
      color: white;
      border-color: #8e160f;
    }

    .answer-btn.neutral {
      background: #f0e2b8;
      color: #6b5b36;
      border-color: #aa9867;
    }

    #feedback {
      min-height: 30px;
      font-size: 1.05rem;
      font-weight: bold;
      margin-bottom: 18px;
    }

    #feedback.correct {
      color: var(--asterix-green);
    }

    #feedback.wrong {
      color: var(--asterix-red);
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .control-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      min-width: 180px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .control-btn:hover {
      transform: translateY(-1px);
    }

    #next-btn {
      background: var(--asterix-green);
      display: none;
    }

    #restart-btn {
      background: #2d6cdf;
      display: none;
    }

    #score {
      margin-top: 18px;
      font-size: 1.3rem;
      font-weight: bold;
    }

    #final-message {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--asterix-red);
    }

    canvas#confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    @media (max-width: 600px) {
      .quiz-container {
        padding: 24px 18px;
      }

      h1 {
        font-size: 1.6rem;
      }

      #question {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <div class="quiz-container">
    <h1>Quiz : Astérix et Cléopâtre</h1>
    <p class="subtitle">Teste tes connaissances sur la bande dessinée.</p>

    <div id="progress"></div>
    <h2 id="question">Question ici</h2>
    <div id="answers"></div>
    <div id="feedback"></div>

    <div class="controls">
      <button id="next-btn" class="control-btn" onclick="nextQuestion()">Question suivante</button>
      <button id="restart-btn" class="control-btn" onclick="restartQuiz()">Recommencer</button>
    </div>

    <h3 id="score"></h3>
    <div id="final-message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
