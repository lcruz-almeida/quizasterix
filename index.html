<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz - Astérix et Cléopâtre</title>

  <!-- Font style Astérix (approximation) -->
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

  <style>
    :root {
      --asterix-gold: #ffd700;
      --asterix-red: #db281c;
      --asterix-green: #008435;
      --asterix-black: #1a171e;
      --asterix-parchment: #f8e0b1;
      --asterix-white: #fffdf7;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #fff6d6 0%, var(--asterix-parchment) 45%, #eed39c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quiz-container {
      width: 100%;
      max-width: 700px;
      background: var(--asterix-white);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      font-family: 'Luckiest Guy', cursive;
      font-size: 2.5rem;
      color: var(--asterix-red);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    #question {
      font-size: 1.4rem;
      margin: 20px 0;
    }

    #answers {
      display: grid;
      gap: 12px;
    }

    .answer-btn {
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: var(--asterix-gold);
    }

    .answer-btn.correct {
      background: var(--asterix-green);
      color: white;
    }

    .answer-btn.wrong {
      background: var(--asterix-red);
      color: white;
    }

    .answer-btn.neutral {
      background: #eee;
    }

    #next-btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: var(--asterix-green);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: none;
    }

    #restart-btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: #2d6cdf;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: none;
    }

    #score {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="quiz-container">
  <h1>Astérix & Cléopâtre</h1>

  <h2 id="question"></h2>
  <div id="answers"></div>

  <button id="next-btn" onclick="nextQuestion()">Suivant</button>
  <button id="restart-btn" onclick="restartQuiz()">Recommencer</button>

  <h3 id="score"></h3>
</div>

<script src="script.js"></script>

</body>
</html>
